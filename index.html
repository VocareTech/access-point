<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>VocareTech - Links</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .vocare-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
      border-radius: 16px;
      background-color: transparent;
    }

    .vocare-logo {
      height: 48px;
      width: auto;
    }

    .social-links {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      text-decoration: none;
    }

    .social-links img {
      width: 24px;
      height: 24px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="vocare-card">
    <img src="assets/logo-vocaretech.png" alt="VocareTech" class="vocare-logo">

    <div class="social-links">
      <a href="https://vocaretech.com.br" target="_blank" rel="noopener noreferrer">
        <img src="assets/icon-web.png" alt="Site VocareTech">
      </a>
      <a href="https://instagram.com/seu-instagram" target="_blank" rel="noopener noreferrer">
        <img src="assets/icon-instagram.png" alt="Instagram VocareTech">
      </a>
      <a href="https://linkedin.com/in/seu-linkedin" target="_blank" rel="noopener noreferrer">
        <img src="assets/icon-likedin.png" alt="LinkedIn VocareTech">
      </a>
    </div>
  </div>
</body>
</html>
